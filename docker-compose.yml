version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: insureco-postgres
    environment:
      POSTGRES_DB: insureco
      POSTGRES_USER: insureco
      POSTGRES_PASSWORD: insureco123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U insureco"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka (Stubbed with simple message queue)
  kafka-stub:
    image: redis:7-alpine
    container_name: insureco-kafka-stub
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway
  api-gateway:
    build: ./services/api-gateway
    container_name: insureco-api-gateway
    ports:
      - "8000:8000"
    environment:
      - CLAIMS_SERVICE_URL=http://claims-service:3001
      - DOCUMENT_SERVICE_URL=http://document-service:8001
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      - claims-service
      - document-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Claims Service (NestJS)
  claims-service:
    build: ./services/claims-service
    container_name: insureco-claims-service
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://insureco:insureco123@postgres:5432/insureco
      - KAFKA_BROKER=kafka-stub:6379
      - JWT_SECRET=your-secret-key-change-in-production
    depends_on:
      postgres:
        condition: service_healthy
      kafka-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Document Service (FastAPI)
  document-service:
    build: ./services/document-service
    container_name: insureco-document-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://insureco:insureco123@postgres:5432/insureco
      - S3_BUCKET=insureco-documents-local
      - S3_ENDPOINT=http://s3-stub:9000
    volumes:
      - document_storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Notification Service (Go)
  notification-service:
    build: ./services/notification-service
    container_name: insureco-notification-service
    ports:
      - "8002:8002"
    environment:
      - KAFKA_BROKER=kafka-stub:6379
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
    depends_on:
      kafka-stub:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Claims Processor (Java/Spring)
  claims-processor:
    build: ./services/claims-processor
    container_name: insureco-claims-processor
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/insureco
      - DATABASE_USER=insureco
      - DATABASE_PASSWORD=insureco123
      - KAFKA_BROKER=kafka-stub:6379
    depends_on:
      postgres:
        condition: service_healthy
      kafka-stub:
        condition: service_healthy

  # Frontend (React)
  frontend:
    build: ./frontend
    container_name: insureco-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api-gateway

  # MailHog (Email testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: insureco-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI

volumes:
  postgres_data:
  document_storage:

networks:
  default:
    name: insureco-network

# Made with Bob
